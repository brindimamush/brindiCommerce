# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# Allow Alembic to find the 'app' module by prepending the current directory to sys.path
prepend_sys_path = .

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Max length of characters permitted for tag slug
truncate_slug_length = 40

# Default database URL placeholder (overridden programmatically by env.py)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/commercehub

[post_write_hooks]
# Configure hooks here if you want auto-formatting (e.g., using black or ruff) after a revision is created

[loggers]
keys = root,alembic,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S